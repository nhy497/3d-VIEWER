[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "16"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.glb"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Content-Type = "model/gltf-binary"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
