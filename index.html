<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模型預覽器 - 線上版本</title>
    <meta name="description" content="專業的 3D 模型線上預覽工具，支援 GLB/GLTF 格式">
    <meta property="og:title" content="3D 模型預覽器">
    <meta property="og:description" content="專業的 3D 模型線上預覽工具">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #info h3 {
            margin: 0 0 10px 0;
            color: #4CAF50;
        }
        
        #currentFile {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(76, 175, 80, 0.2);
            border-radius: 5px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            font-size: 13px;
            word-break: break-all;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px 40px;
            border-radius: 15px;
            font-size: 18px;
            z-index: 200;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 25px;
            border-radius: 15px;
            z-index: 100;
            display: flex;
            gap: 20px;
            align-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .controls button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        
        .controls label {
            font-size: 14px;
            font-weight: 500;
        }
        
        .controls input[type="range"] {
            width: 120px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }
        
        .controls input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #4CAF50;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .file-upload {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        
        .file-upload label {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .file-upload label:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        
        .file-upload input[type="file"] {
            display: none;
        }
        
        .error-message {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        
        <div id="info">
            <h3>🎯 3D 模型預覽器</h3>
            <p>🖱️ 滑鼠拖曳旋轉 | 🔄 滾輪縮放</p>
            <p>📁 支援 GLB/GLTF 格式</p>
            <div id="currentFile">📄 當前文件: model.glb</div>
        </div>
        
        <div class="file-upload">
            <label for="fileInput">📤 上傳模型</label>
            <input type="file" id="fileInput" accept=".glb,.gltf">
        </div>
        
        <div id="loading">
            <div class="spinner"></div>
            <div>正在載入 3D 模型...</div>
        </div>
        
        <div class="controls">
            <button onclick="resetCamera()">🔄 重置相機</button>
            <button onclick="toggleWireframe()">🔲 切換線框</button>
            <button onclick="toggleAutoRotate()">🔄 自動旋轉</button>
            <label>
                💡 光照強度: 
                <input type="range" id="lightIntensity" min="0" max="2" step="0.1" value="1">
            </label>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        let scene, camera, renderer, controls, model;
        let autoRotate = false;
        let wireframe = false;
        let ambientLight, directionalLight, fillLight1, fillLight2, pointLight;
        let currentFileName = 'model.glb';
        
        function init() {
            // 創建場景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);
            
            // 添加霧化效果
            scene.fog = new THREE.Fog(0xf0f0f0, 10, 50);
            
            // 創建相機
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // 創建渲染器
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('canvas'),
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            
            // 創建控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 1;
            controls.maxDistance = 50;
            controls.maxPolarAngle = Math.PI;
            
            setupLighting();
            
            // 添加網格地面
            const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0xcccccc);
            scene.add(gridHelper);
            
            // 載入預設模型
            loadDefaultModel();
            
            // 監聽視窗大小變化
            window.addEventListener('resize', onWindowResize, false);
            
            // 監聽文件上傳
            document.getElementById('fileInput').addEventListener('change', handleFileUpload);
            
            // 監聽光照強度
            document.getElementById('lightIntensity').addEventListener('input', function(e) {
                updateLighting(parseFloat(e.target.value));
            });
        }
        
        function setupLighting() {
            // 環境光
            ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            // 主方向光
            directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 50;
            scene.add(directionalLight);
            
            // 補光1
            fillLight1 = new THREE.DirectionalLight(0xffffff, 0.5);
            fillLight1.position.set(-10, 5, -5);
            scene.add(fillLight1);
            
            // 補光2
            fillLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
            fillLight2.position.set(5, -5, 10);
            scene.add(fillLight2);
            
            // 點光源
            pointLight = new THREE.PointLight(0xffffff, 0.8);
            pointLight.position.set(0, 10, 0);
            scene.add(pointLight);
        }
        
        function updateLighting(intensity) {
            if (ambientLight) ambientLight.intensity = 0.8 * intensity;
            if (directionalLight) directionalLight.intensity = 1.0 * intensity;
            if (fillLight1) fillLight1.intensity = 0.5 * intensity;
            if (fillLight2) fillLight2.intensity = 0.3 * intensity;
            if (pointLight) pointLight.intensity = 0.8 * intensity;
        }
        
        function loadDefaultModel() {
            // 載入預設模型
            loadModel('model.glb');
        }
        
        function loadModel(modelPath, fileName) {
            const loader = new THREE.GLTFLoader();
            
            // 更新當前文件名顯示
            if (fileName) {
                currentFileName = fileName;
                document.getElementById('currentFile').textContent = '📄 當前文件: ' + fileName;
            }
            
            loader.load(
                modelPath || 'model.glb',
                function(gltf) {
                    // 移除舊模型
                    if (model) {
                        scene.remove(model);
                    }
                    
                    model = gltf.scene;
                    
                    // 調整模型大小和位置
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 8 / maxDim;
                    model.scale.multiplyScalar(scale);
                    
                    model.position.sub(center.multiplyScalar(scale));
                    model.position.y = 0;
                    
                    // 改善材質和顯示
                    model.traverse(function(child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            
                            // 確保雙面渲染
                            if (child.material) {
                                child.material.side = THREE.DoubleSide;
                                child.material.needsUpdate = true;
                                
                                // 改善材質屬性
                                if (child.material.color) {
                                    child.material.color.convertSRGBToLinear();
                                }
                                
                                if (child.material instanceof THREE.MeshStandardMaterial) {
                                    child.material.roughness = 0.5;
                                    child.material.metalness = 0.1;
                                }
                            }
                        }
                    });
                    
                    scene.add(model);
                    
                    // 調整相機位置
                    const distance = maxDim * 3;
                    camera.position.set(distance * 0.8, distance * 0.6, distance * 0.8);
                    camera.lookAt(0, 0, 0);
                    
                    // 隱藏載入訊息
                    document.getElementById('loading').style.display = 'none';
                    
                    animate();
                },
                function(progress) {
                    const percent = (progress.loaded / progress.total * 100).toFixed(1);
                    document.getElementById('loading').innerHTML = `
                        <div class="spinner"></div>
                        <div>載入中... ${percent}%</div>
                    `;
                },
                function(error) {
                    console.error('載入模型時發生錯誤:', error);
                    document.getElementById('loading').innerHTML = `
                        <div class="error-message">
                            ❌ 載入失敗！<br>
                            請檢查文件格式或上傳您自己的模型文件
                        </div>
                    `;
                }
            );
        }
        
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                document.getElementById('loading').style.display = 'block';
                loadModel(url, file.name);
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        function resetCamera() {
            if (model) {
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const distance = maxDim * 3;
                
                camera.position.set(distance * 0.8, distance * 0.6, distance * 0.8);
                camera.lookAt(0, 0, 0);
                controls.reset();
            }
        }
        
        function toggleWireframe() {
            if (model) {
                wireframe = !wireframe;
                model.traverse(function(child) {
                    if (child.isMesh) {
                        child.material.wireframe = wireframe;
                    }
                });
            }
        }
        
        function toggleAutoRotate() {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 2.0;
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
